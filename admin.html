<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>Admin Portal</h2>
            <nav>
                <a href="#" class="active">Dashboard</a>
                <a href="index.html" onclick="logout()">Logout</a>
            </nav>
        </aside>
        <main class="content">
            <header>
                <h1>Admin Dashboard</h1>
            </header>
            <div class="summary-cards">
                <div class="card">
                    <h3>Total Students</h3>
                    <p class="stat" id="adminTotalStudents">0</p>
                </div>
                <div class="card">
                    <h3>Total Subjects</h3>
                    <p class="stat" id="totalSubjects">0</p>
                </div>
                <div class="card">
                    <h3>Average Performance</h3>
                    <p class="stat" id="avgPerformance">0%</p>
                </div>
            </div>
            <div class="card">
                <h2>Assign Subject to Student</h2>
                <form id="assignSubjectForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="studentSelect">Student</label>
                            <select id="studentSelect" required></select>
                        </div>
                        <div class="form-group">
                            <label for="subjectSelect">Subject</label>
                            <select id="subjectSelect" required></select>
                        </div>
                        <button type="submit" class="btn-primary">Assign</button>
                    </div>
                </form>
            </div>
            <div class="card">
                <h2>Student-Subject Assignments</h2>
                <table id="assignmentsTable">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Assigned Subjects</th>
                            <th>Performance</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <script>
        if (localStorage.getItem('role') !== 'admin') {
            window.location.href = 'index.html';
        }
        loadAdminDashboard();
    </script>
</body>
</html>
